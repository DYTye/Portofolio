<script>
  const bgb = document.getElementById("bg-bot");

navItems.forEach((nav) => {
  nav.addEventListener("click", () => {
    const posisiBgb = nav.getBoundingClientRect();
    const posisiParentb = nav.parentElement.getBoundingClientRect();

    bgb.style.width = posisiBgb.width + "px";
    bgb.style.height = posisiBgb.height + "px";

    bgb.style.left = posisiBgb.left - posisiParentb.left + "px";
    bgb.style.top = posisiBgb.top - posisiParentb.top + "px";
  });
});

if (navItems.length > 0) {
  setTimeout(() => {
    const navbt = navItems[5];

    const posisiBgb = navbt.getBoundingClientRect();
    const posisiParentb = navbt.parentElement.getBoundingClientRect();

    bgb.style.width = posisiBgb.width + "px";
    bgb.style.height = posisiBgb.height + "px";
    bgb.style.left = posisiBgb.left - posisiParentb.left + "px";
    bgb.style.top = posisiBgb.top - posisiParentb.top + "px";
  }, 50);
}
</script>
<nav
  class="fixed bottom-0 right-0 left-0 z-[999] mt-2 justify-center text-xs"
  id="nav"
>
  <ul
    class="overflow-hidden relative grid grid-cols-5 justify-center items-center text-center w-fit mx-auto rounded-xl bg-[#212326]/70 text-amber-100 backdrop-blur-sm"
  >
    <li
      id="bg-bot"
      class="transition-all duration-300 absolute z-10 font-extrabold flex gap-2 items-center bg-[#D23B7B] backdrop-blur-sm rounded-xl lofi"
    ></li>
    <li class="transition-all duration-300 p-3 z-20  nav-items lofi">
      <div>Lofi</div>
    </li>

    <li class="transition-all duration-300 p-3 z-20 nav-items project">
      <div>Project</div>
    </li>
    <li class="transition-all duration-300 p-3 z-20 nav-items art">Sketch</li>
    <li class="transition-all duration-300 p-3 z-20 nav-items setup">Setup</li>
    <li class="transition-all duration-300 p-3 z-20 nav-items source">
      Source
    </li>
  </ul>
</nav>
