<div
  class="bg-[#212326] p-8 rounded-3xl border border-[#462C7D] max-w-2xl mx-auto shadow-2xl my-7"
>
  <h2 class="text-[#fef3c7] font-mono text-xl mb-6 flex items-center gap-2">
    <span class="w-3 h-3 bg-[#D23B7B] rounded-full animate-pulse"></span>
    Web Palette:
  </h2>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4 font-mono">
    <!-- Primary Colors -->
    <div class="space-y-3">
      <p class="text-[#fef3c7]/50 text-xs uppercase tracking-widest">
        Primary & Text
      </p>

      <!-- Dark Background -->
      <div
        class="group flex items-center gap-3 bg-[#1a1c1e] p-2 rounded-xl border border-[#212326] hover:border-[#D23B7B] transition-all"
      >
        <div class="w-12 h-12 rounded-lg bg-[#212326] shadow-inner"></div>
        <div>
          <p class="text-[#fef3c7] text-sm">Deep Dark</p>
          <p class="text-[#D23B7B] text-xs">#212326</p>
        </div>
      </div>

      <!-- Amber Text -->
      <div
        class="group flex items-center gap-3 bg-[#1a1c1e] p-2 rounded-xl border border-[#212326] hover:border-[#FCBF49] transition-all"
      >
        <div class="w-12 h-12 rounded-lg bg-[#fef3c7] shadow-inner"></div>
        <div>
          <p class="text-[#fef3c7] text-sm">Soft Amber</p>
          <p class="text-[#D23B7B] text-xs">#fef3c7</p>
        </div>
      </div>
    </div>

    <!-- Accent Colors -->
    <div class="space-y-3">
      <p class="text-[#fef3c7]/50 text-xs uppercase tracking-widest">
        Accents & Highlights
      </p>

      <!-- Magenta Accent -->
      <div
        class="group flex items-center gap-3 bg-[#1a1c1e] p-2 rounded-xl border border-[#212326] hover:border-[#D23B7B] transition-all"
      >
        <div
          class="w-12 h-12 rounded-lg bg-[#D23B7B] shadow-lg shadow-[#D23B7B]/20"
        ></div>
        <div>
          <p class="text-[#fef3c7] text-sm">Retro Magenta</p>
          <p class="text-[#D23B7B] text-xs">#D23B7B</p>
        </div>
      </div>

      <!-- Golden Yellow -->
      <div
        class="group flex items-center gap-3 bg-[#1a1c1e] p-2 rounded-xl border border-[#212326] hover:border-[#FCBF49] transition-all"
      >
        <div
          class="w-12 h-12 rounded-lg bg-[#FCBF49] shadow-lg shadow-[#FCBF49]/20"
        ></div>
        <div>
          <p class="text-[#fef3c7] text-sm">Cyber Gold</p>
          <p class="text-[#D23B7B] text-xs">#FCBF49</p>
        </div>
      </div>
    </div>

    <!-- Deep Accents -->
    <p class="text-[#fef3c7]/50 text-xs uppercase tracking-widest">
      Deep Accents
    </p>
    <div class="md:col-span-2 grid grid-cols-2 gap-4">
      <div
        class="group flex items-center gap-3 bg-[#1a1c1e] p-2 rounded-xl border border-[#212326] hover:border-[#462C7D] transition-all"
      >
        <div class="w-10 h-10 rounded-lg bg-[#462C7D]"></div>
        <div class="flex flex-col">
          <p class="text-[#fef3c7] text-sm">Midnight Purple</p>
          <p class="text-[#D23B7B] text-xs">#462C7D</p>
        </div>
      </div>
      <div
        class="group flex items-center gap-3 bg-[#1a1c1e] p-2 rounded-xl border border-[#212326] hover:border-[#831C91] transition-all"
      >
        <div class="w-10 h-10 rounded-lg bg-[#831C91]"></div>
        <div class="flex flex-col">
          <p class="text-[#fef3c7] text-sm">Mulberry</p>
          <p class="text-[#D23B7B] text-xs">#831C91</p>
        </div>
      </div>
    </div>
  </div>
</div>
