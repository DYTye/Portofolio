<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Test Animasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body
    class="bg-gray-900 flex flex-col items-center justify-center h-screen gap-10 text-white"
  >
    <!-- BOX -->
    <div
      id="box"
      class="w-64 h-64 bg-pink-500 flex items-center justify-center rounded-xl transition-all duration-500 ease-in-out cursor-pointer"
    >
      Klik Gue
    </div>

    <div class="flex items-center rounded-sm">
      <!-- Container utama yang nentuin rasio 16:9 -->
      <div class="aspect-video w-full my-0 lg:my-10 overflow-hidden rounded-xl">
        <!-- Langsung img sebagai anak dari aspect-video -->
        <img
          class="w-full h-full object-cover"
          src="bgc.png"
          alt="Slide"
          id="slide"
        />
      </div>
    </div>
    <script>
      const foto = [];
      foto.push("bgc.png", "kupi.png", "profil.png");

      const slide = document.getElementById("slide");
      let i = 0;
      setInterval(() => {
        slide.src = foto[i];
        i++;

        if (i === foto.length) {
          i = 0;
        }
      }, 1000);

      const box = document.getElementById("box");
      const btn = document.getElementById("btn");

      function animateBox() {
        box.classList.toggle("translate-x-[300px]");
        box.classList.toggle("rotate-6");
        box.classList.toggle("opacity-50");
        box.classList.toggle("scale-110");
      }

      // klik box
      box.addEventListener("click", animateBox);

      // klik button
      btn.addEventListener("click", animateBox);
    </script>
  </body>
</html>
