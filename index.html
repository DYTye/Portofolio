<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>porto</title>
  </head>

  <div class="fixed inset-0 backdrop-blur-sm bg-[#212326]/70 -z-10 opacity-0" id="glass"></div>
  <body
    class="bg-[url('https://txwatpcjenskrdnispuu.supabase.co/storage/v1/object/public/pasar3d/bgc.webp')] bg-[length:100%_auto] lg:bg-top bg-repeat-y lg:bg-no-repeat text-amber-100 font-mono bg-fixed"
    id="body">
    <div id="navbar-placeholder" class="sticky top-1 justify-center z-30"></div>

    <div id="botNav" class="flex lg:hidden z-40"></div>

    <!-- bebek gw ini  -->
    <div
      class="bebek sticky top-2 z-10 flex justify-center w-auto lg:w-fit mx-7 lg:mx-auto"
      id="bebek"
    >
      <div class="relative z-10 backdrop-blur-sm border-2 p-5 my-3 rounded-md">
        <div class="py-4">
          <div class="w-full">
            <div
              class="text-[#33363b] font-extrabold text-center text-2xl underline underline-offset-8s"
            >
              Select Your Character
            </div>
            <div class="flex flex-col items-center rounded-sm">
              <div class="h-64 w-64 my-0 lg:my-10">
                <model-viewer
                  alt="duck"
                  src="https://txwatpcjenskrdnispuu.supabase.co/storage/v1/object/public/pasar3d/lowpoly_duck_animated.glb"
                  camera-controls
                  touch-action="pan-y"
                  class="w-full h-full"
                  auto-rotate
                  rotation-per-second="30deg"
                  autoplay
                  camera-orbit="45deg 60deg 3m"
                >
                </model-viewer>
              </div>
            </div>
            <div class="text-amber-100 font-bold flex flex-col gap-3 m-2">
              <div
                class="font-extrabold flex gap-2 items-center bg-[#D23B7B] rounded-sm p-3 w-52"
                id="lofi"
              >
                <div>Character :</div>
                <a
                  href="https://www.flaticon.com/free-icons/duck"
                  title="duck icons"
                >
                  <img
                    src="https://txwatpcjenskrdnispuu.supabase.co/storage/v1/object/public/pasar3d/profil.png"
                    class="h-5 w-5"
                    alt=""
                /></a>
                Lofi
              </div>

              <div class="font-extrabold flex items-center gap-2">
                <div class="bg-[#D23B7B] rounded-sm p-3">Skils:</div>
                <div class="grid grid-cols-3 lg:grid-cols-4 gap-2">
                  <div
                    class="font-extrabold flex justify-center bg-[#831C91] rounded-sm p-2 text-xs items-center"
                  >
                    <div>JS</div>
                  </div>

                  <div
                    class="font-extrabold flex justify-center bg-[#462C7D] rounded-sm p-2 text-xs items-center"
                  >
                    <div>Python</div>
                  </div>
                  <div
                    class="font-extrabold flex justify-center bg-[#FCBF49] rounded-sm p-2 text-xs items-center"
                  >
                    <div>Tailwind</div>
                  </div>
                  <div
                    class="font-extrabold flex justify-center bg-[#8494FF] rounded-sm p-2 text-xs items-center"
                  >
                    <div>Next.js</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    

    <div
      id="main"
      class="relative z-30 lg:z-20 "
    ></div>

    <div class="bg-[#212326] z-10" id="footer-placeholder"></div>

    <script
      type="module"
      src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"
    ></script>
    <script src="src/main.js" type="module"></script>
    <script src="https://kit.fontawesome.com/7c1d0ceb52.js" crossorigin="anonymous"></script>
  </body>
</html>
